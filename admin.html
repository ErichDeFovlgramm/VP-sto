<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - ВП Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Перейти к основному контенту</a>

    <header role="banner">
        <div class="header-top">
            <div class="accessibility-controls">
                <button id="fontIncrease" aria-label="Увеличить шрифт">A+</button>
                <button id="fontDecrease" aria-label="Уменьшить шрифт">A-</button>
                <button id="highContrast" aria-label="Высокая контрастность">🔲</button>
            </div>
        </div>
        <div class="header-main">
            <h1 class="logo"><a href="index.html">ВП Store</a></h1>
            <p class="tagline">Киберспортивная атрибутика</p>
        </div>
        <nav role="navigation" aria-label="Основная навигация">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="wishlist.html">Вишлист</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="cart.html">Корзина (<span id="cartCount">0</span>)</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="admin.html" class="active">Админ</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" role="main">
        <h1>Панель администратора</h1>

        <div id="loginSection">
            <!-- Форма входа для админа -->
        </div>

        <div id="adminPanel" style="display: none;">
            <!-- Основное содержимое админки -->
        </div>
    </main>

    <footer role="contentinfo">
        <div class="footer-content">
            <p>&copy; 2024 ВП Store. Все права защищены.</p>
            <p><a href="privacy.html">Политика конфиденциальности</a></p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        let adminProducts = [];
        let adminOrders = [];
        let currentTab = 'products';

        document.addEventListener('DOMContentLoaded', function() {
            checkAdminAuth();
        });

        function checkAdminAuth() {
            if (currentUser && currentUser.role === 'admin') {
                showAdminPanel();
            } else {
                showAdminLogin();
            }
        }

        function showAdminLogin() {
            const section = document.getElementById('loginSection');
            section.innerHTML = `
                <div class="admin-panel">
                    <h2>Вход для администраторов</h2>
                    <form onsubmit="handleAdminLogin(event)">
                        <div class="form-group">
                            <label for="adminEmail">Email:</label>
                            <input type="email" id="adminEmail" required placeholder="admin@example.com">
                        </div>
                        <div class="form-group">
                            <label for="adminPassword">Пароль:</label>
                            <input type="password" id="adminPassword" required placeholder="123">
                        </div>
                        <button type="submit" class="btn">Войти как администратор</button>
                    </form>
                    <p style="margin-top: 1rem; color: #666;">
                        Тестовые данные: admin@example.com / 123
                    </p>
                </div>
            `;
        }

        function handleAdminLogin(event) {
            event.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            loginUser(email, password).then(result => {
                if (result.success && result.user.role === 'admin') {
                    showAdminPanel();
                } else {
                    alert('Неверные учетные данные или недостаточно прав');
                }
            });
        }

        function showAdminPanel() {
            document.getElementById('loginSection').style.display = 'none';
            const panel = document.getElementById('adminPanel');
            panel.style.display = 'block';

            loadAdminData();
            renderAdminPanel();
        }

        function loadAdminData() {
            fetch('database.json')
                .then(response => response.json())
                .then(data => {
                    adminProducts = data.products;
                    adminOrders = JSON.parse(localStorage.getItem('allOrders') || '[]');
                })
                .catch(error => console.error('Error loading admin data:', error));
        }

        function renderAdminPanel() {
            const panel = document.getElementById('adminPanel');

            panel.innerHTML = `
                <div class="admin-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <p>Добро пожаловать, ${currentUser.name}!</p>
                        <button class="btn btn-secondary" onclick="logout()">Выйти из админки</button>
                    </div>

                    <div class="admin-tabs">
                        <button class="admin-tab ${currentTab === 'products' ? 'active' : ''}" onclick="switchTab('products')">Товары</button>
                        <button class="admin-tab ${currentTab === 'orders' ? 'active' : ''}" onclick="switchTab('orders')">Заказы</button>
                        <button class="admin-tab ${currentTab === 'add' ? 'active' : ''}" onclick="switchTab('add')">Добавить товар</button>
                    </div>

                    <div id="tabContent"></div>
                </div>
            `;

            renderTabContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            renderAdminPanel();
        }

        function renderTabContent() {
            const container = document.getElementById('tabContent');

            if (currentTab === 'products') {
                container.innerHTML = `
                    <h2>Управление товарами</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Возраст</th>
                                <th>Наличие</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${adminProducts.map(p => `
                                <tr>
                                    <td>${p.id}</td>
                                    <td>${p.name}</td>
                                    <td>${p.category}</td>
                                    <td>${formatPrice(p.price)}</td>
                                    <td>${p.ageRating}</td>
                                    <td>${p.inStock ? '✅' : '❌'}</td>
                                    <td>
                                        <button class="btn btn-secondary" onclick="editProduct(${p.id})">✏️</button>
                                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } else if (currentTab === 'orders') {
                container.innerHTML = `
                    <h2>Управление заказами</h2>
                    ${adminOrders.length === 0 ? '<p>Заказов пока нет</p>' : `
                        <table>
                            <thead>
                                <tr>
                                    <th>№ заказа</th>
                                    <th>Клиент</th>
                                    <th>Дата</th>
                                    <th>Сумма</th>
                                    <th>Статус</th>
                                    <th>Доставка</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${adminOrders.map(order => `
                                    <tr>
                                        <td>${order.orderNumber}</td>
                                        <td>${order.userId}</td>
                                        <td>${formatDate(order.createdAt)}</td>
                                        <td>${formatPrice(order.total)}</td>
                                        <td><span class="order-status status-${order.status}">${getStatusText(order.status)}</span></td>
                                        <td>${order.deliveryMethod}</td>
                                        <td>
                                            <select onchange="updateOrderStatus(${order.id}, this.value)" style="padding: 0.5rem;">
                                                <option value="">Изменить статус</option>
                                                <option value="pending">Ожидает</option>
                                                <option value="processing">Обрабатывается</option>
                                                <option value="shipped">Отправлен</option>
                                                <option value="delivered">Доставлен</option>
                                                <option value="cancelled">Отменён</option>
                                            </select>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                `;
            } else if (currentTab === 'add') {
                container.innerHTML = `
                    <h2>Добавить новый товар</h2>
                    <form onsubmit="addNewProduct(event)">
                        <div class="form-group">
                            <label for="newName">Название:</label>
                            <input type="text" id="newName" required>
                        </div>
                        <div class="form-group">
                            <label for="newPrice">Цена:</label>
                            <input type="number" id="newPrice" required min="0">
                        </div>
                        <div class="form-group">
                            <label for="newCategory">Категория:</label>
                            <select id="newCategory" required>
                                <option value="Периферия">Периферия</option>
                                <option value="Аудио">Аудио</option>
                                <option value="Одежда">Одежда</option>
                                <option value="Аксессуары">Аксессуары</option>
                                <option value="Игры">Игры</option>
                                <option value="Коллекционное">Коллекционное</option>
                                <option value="Напитки">Напитки</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="newAgeRating">Возрастная категория:</label>
                            <select id="newAgeRating" required>
                                <option value="0+">0+</option>
                                <option value="6+">6+</option>
                                <option value="12+">12+</option>
                                <option value="16+">16+</option>
                                <option value="18+">18+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="newDescription">Описание:</label>
                            <textarea id="newDescription" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="newImage">URL изображения:</label>
                            <input type="url" id="newImage" placeholder="https://..." value="https://via.placeholder.com/300x200">
                        </div>
                        <div class="checkbox-group form-group">
                            <input type="checkbox" id="newInStock" checked>
                            <label for="newInStock">В наличии</label>
                        </div>
                        <button type="submit" class="btn btn-success">Добавить товар</button>
                    </form>
                `;
            }
        }

        function getStatusText(status) {
            const statuses = {
                'pending': 'Ожидает обработки',
                'processing': 'Обрабатывается',
                'shipped': 'Отправлен',
                'delivered': 'Доставлен',
                'cancelled': 'Отменён'
            };
            return statuses[status] || status;
        }

        function editProduct(id) {
            const product = adminProducts.find(p => p.id === id);
            if (!product) return;

            const newName = prompt('Название:', product.name);
            if (newName === null) return;

            const newPrice = prompt('Цена:', product.price);
            if (newPrice === null) return;

            const newDescription = prompt('Описание:', product.description);
            if (newDescription === null) return;

            const inStock = confirm('Товар в наличии? OK - да, Отмена - нет');

            adminUpdateProduct(id, {
                name: newName,
                price: parseFloat(newPrice),
                description: newDescription,
                inStock: inStock
            });

            loadAdminData();
            renderTabContent();
        }

        function deleteProduct(id) {
            adminDeleteProduct(id);
            loadAdminData();
            renderTabContent();
        }

        function addNewProduct(event) {
            event.preventDefault();

            const newProduct = {
                name: document.getElementById('newName').value,
                price: parseFloat(document.getElementById('newPrice').value),
                category: document.getElementById('newCategory').value,
                ageRating: document.getElementById('newAgeRating').value,
                description: document.getElementById('newDescription').value,
                image: document.getElementById('newImage').value || 'https://via.placeholder.com/300x200',
                inStock: document.getElementById('newInStock').checked
            };

            adminAddProduct(newProduct);

            // Очистить форму
            event.target.reset();

            // Переключиться на вкладку товаров
            switchTab('products');
        }
    </script>
</body>
</html>
